<VirtualHost *:80>
    # On pointe vers le dossier public pour la sécurité et le fonctionnement du MVC
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Erreurs logs (optionnel mais utile pour débugger)
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

#  Force Apache à chercher l'index.php dans /public, 
#  permettant au Routeur de gérer toutes les requêtes entrantes.